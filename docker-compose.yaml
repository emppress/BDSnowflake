services:
  postgres:
    image: postgres:16
    container_name: postgres_lab1
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./data:/data
      - ./sql_init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
    pg_data: